<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Soporte Marateca</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:       #00C48C;
    --brand-dark:  #009E72;
    --bg-chat:     #F0F2F5;
    --bubble-bot:  #FFFFFF;
    --bubble-user: #DCF8C6;
    --text-main:   #111B21;
    --text-muted:  #667781;
    --shadow:      0 1px 0.5px rgba(0,0,0,.13);
  }

  /*
    ═══════════════════════════════════════════════════════════
    ESTRATEGIA CORE: "dejar ganar al navegador"
    ───────────────────────────────────────────────────────────
    html y body ocupan EXACTAMENTE el área visible.
    overflow: hidden en ambos → no existe scroll del documento.
    Cuando el teclado aparece, el navegador reduce este espacio
    y el layout reacciona solo via flexbox. Sin JS de viewport.
    ═══════════════════════════════════════════════════════════
  */
  html, body {
    height: 100%;
    /* -webkit-fill-available es más confiable que 100vh en iOS Safari,
       porque 100vh en Safari incluye la barra del navegador */
    height: -webkit-fill-available;
    overflow: hidden;
    background: var(--brand);
    font-family: 'DM Sans', sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  /*
    #chat-wrapper:
    - height: 100% del body (espacio visible real)
    - display: flex columna → divide el espacio entre header, mensajes y form
    - Cuando el teclado sube, el body se encoge → el wrapper se encoge
      → flexbox redistribuye el espacio → solo #chat-messages se reduce
      → header y form NO se mueven
  */
  #chat-wrapper {
    width: 100%;
    height: 100%;
    height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    background: var(--bg-chat);
    /* Evita cualquier bounce/scroll del contenedor en iOS */
    overflow: hidden;
    position: relative;
  }

  /* ── HEADER ───────────────────────────────────────────────────────────── */
  #chat-header {
    /* flex-shrink: 0 → NUNCA se encoge, siempre ocupa su espacio */
    flex-shrink: 0;
    background: var(--brand);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 12px 12px 16px;
    /* Notch / Dynamic Island de iPhone */
    padding-top: max(12px, env(safe-area-inset-top));
    z-index: 10;
  }

  .header-info { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-text h3  { font-size: 15px; font-weight: 600; line-height: 1.2; }
  .header-text .status {
    font-size: 12px; opacity: .85;
    display: flex; align-items: center; gap: 5px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #7CFC00;
    box-shadow: 0 0 0 2px rgba(124,252,0,.3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(124,252,0,.3); }
    50%      { box-shadow: 0 0 0 5px rgba(124,252,0,.0); }
  }
  #close-btn {
    background: none; border: none; color: rgba(255,255,255,.85);
    font-size: 18px; cursor: pointer; padding: 8px;
    border-radius: 50%; line-height: 1;
  }

  /* ── MENSAJES ─────────────────────────────────────────────────────────── */
  #chat-messages {
    /*
      flex: 1 1 0 → ocupa todo el espacio sobrante Y puede encogerse.
      Cuando el teclado aparece y el wrapper se reduce, este es el
      único elemento que cede espacio. Header y form no ceden.
    */
    flex: 1 1 0;
    min-height: 0; /* crítico en Firefox — sin esto flex-shrink no funciona */
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    padding: 10px 10px 6px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .msg {
    max-width: 82%;
    padding: 7px 10px 5px;
    border-radius: 8px;
    font-size: 16px; /* 16px mínimo — evita zoom automático en iOS */
    line-height: 1.45;
    color: var(--text-main);
    box-shadow: var(--shadow);
    word-break: break-word;
    animation: popIn .18s ease-out;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.93) translateY(4px); }
    to   { opacity: 1; transform: scale(1)   translateY(0);   }
  }
  .msg.bot  { background: var(--bubble-bot);  align-self: flex-start; border-top-left-radius: 2px; }
  .msg.user { background: var(--bubble-user); align-self: flex-end;   border-top-right-radius: 2px; }
  .msg .time {
    font-size: 11px; color: var(--text-muted);
    float: right; margin-left: 8px; margin-top: 3px; line-height: 1;
  }

  /* ── TYPING ───────────────────────────────────────────────────────────── */
  #typing-indicator {
    display: none; gap: 4px;
    padding: 10px 12px; width: fit-content;
    background: var(--bubble-bot);
    border-radius: 8px; border-top-left-radius: 2px;
    margin: 0 10px 4px;
    box-shadow: var(--shadow);
  }
  #typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #aaa; display: block;
    animation: bounce 1.2s infinite ease-in-out;
  }
  #typing-indicator span:nth-child(2) { animation-delay: .2s; }
  #typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-6px); }
  }

  /* ── FORM ─────────────────────────────────────────────────────────────── */
  #chat-form {
    /* flex-shrink: 0 → NUNCA se encoge, siempre visible sobre el teclado */
    flex-shrink: 0;
    background: #F0F2F5;
    border-top: 1px solid #D9DBDF;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    /* Barra de gestos en iPhones sin botón home */
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }

  #chat-input {
    flex: 1;
    border: none;
    border-radius: 24px;
    background: #fff;
    padding: 10px 16px;
    font-size: 16px; /* 16px mínimo — evita zoom automático en iOS */
    font-family: inherit;
    color: var(--text-main);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    transition: box-shadow .2s;
  }
  #chat-input:focus { box-shadow: 0 0 0 2px rgba(0,196,140,.35); }
  #chat-input::placeholder { color: #aaa; }

  #send-btn {
    flex-shrink: 0;
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--brand); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    box-shadow: 0 2px 6px rgba(0,196,140,.4);
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
  }
  #send-btn:active { transform: scale(.92); }
  #send-btn svg { width: 20px; height: 20px; }

  .date-sep {
    text-align: center; font-size: 12px; color: var(--text-muted);
    background: rgba(255,255,255,.7); border-radius: 8px;
    padding: 3px 10px; align-self: center; margin: 6px 0;
  }

  /* ══════════════════════════════════════════════════════════
     DESKTOP: ventana flotante (para cuando integres en tu web)
     Descomenta esto cuando quieras el comportamiento de escritorio.
     En móvil, el media query hace que use el layout de pantalla completa.
     ══════════════════════════════════════════════════════════
  @media (min-width: 768px) {
    body { background: #e5ddd5; display: flex; align-items: flex-end; justify-content: flex-end; padding: 24px; }
    #chat-wrapper { width: 380px; height: 600px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
  }
  */
</style>
</head>
<body>

<div id="chat-wrapper">

  <header id="chat-header">
    <div class="header-info">
      <div class="avatar">🏃</div>
      <div class="header-text">
        <h3>Soporte Marateca</h3>
        <span class="status"><span class="status-dot"></span>En línea</span>
      </div>
    </div>
    <button id="close-btn" aria-label="Cerrar">✕</button>
  </header>

  <div id="chat-messages">
    <div class="date-sep">Hoy</div>
    <div class="msg bot">
      ¡Hola! 👋 Bienvenido al soporte de Marateca. ¿En qué puedo ayudarte hoy?
      <span class="time" id="welcome-time"></span>
    </div>
  </div>

  <div id="typing-indicator" role="status" aria-label="Escribiendo">
    <span></span><span></span><span></span>
  </div>

  <form id="chat-form" autocomplete="off">
    <input
      type="text"
      id="chat-input"
      placeholder="Escribe un mensaje..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="sentences"
      spellcheck="false"
      enterkeyhint="send"
    >
    <button type="submit" id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </form>

</div>

<script>
const chatMessages    = document.getElementById('chat-messages');
const chatForm        = document.getElementById('chat-form');
const chatInput       = document.getElementById('chat-input');
const typingIndicator = document.getElementById('typing-indicator');

document.getElementById('welcome-time').textContent = getTime();

/*
  JS mínimo — solo dos responsabilidades:
  1. Scroll al último mensaje cuando el teclado abre
  2. Scroll al último mensaje cuando llega un mensaje nuevo
  El layout en sí lo maneja CSS puro via flexbox.
*/
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    requestAnimationFrame(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  }, { passive: true });
}

/* Scroll al último mensaje cuando se enfoca el input (teclado abre) */
chatInput.addEventListener('focus', () => {
  setTimeout(() => {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }, 300); /* espera a que termine la animación del teclado */
});

/* ── LÓGICA CHAT ──────────────────────────────────────────────────────── */
const N8N_WEBHOOK_URL = 'https://TU_DOMINIO.app.n8n.cloud/webhook/TU_ID';

function getTime() {
  return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${escapeHtml(text)}<span class="time">${getTime()}</span>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping(show) {
  typingIndicator.style.display = show ? 'flex' : 'none';
  if (show) chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function sendToN8n(message) {
  showTyping(true);
  try {
    const res = await fetch(N8N_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, timestamp: Date.now() })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    showTyping(false);
    const reply = data?.output ?? data?.message ?? data?.text ?? '(Sin respuesta)';
    addMessage(reply, 'bot');
  } catch (err) {
    showTyping(false);
    addMessage('⚠️ No pude conectar con el servidor. Intenta de nuevo.', 'bot');
    console.error('[n8n]', err);
  }
}

chatForm.addEventListener('submit', e => {
  e.preventDefault();
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  addMessage(text, 'user');
  sendToN8n(text);
});

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    chatForm.dispatchEvent(new Event('submit'));
  }
});

document.getElementById('close-btn').addEventListener('click', () => {
  console.log('Chat cerrado');
});
</script>
</body>
</html>
