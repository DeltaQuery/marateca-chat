<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>Soporte Marateca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:        #00C48C;
    --brand-dark:   #009E72;
    --bg-chat:      #F0F2F5;
    --bubble-bot:   #FFFFFF;
    --bubble-user:  #DCF8C6;
    --text-main:    #111B21;
    --text-muted:   #667781;
    --header-h:     56px;
    --form-h:       60px;
    --shadow:       0 1px 0.5px rgba(0,0,0,.13);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--brand);
    font-family: 'DM Sans', sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  /*
   * ── CLAVE ──────────────────────────────────────────────────────────────────
   * position: fixed  →  saca el contenedor del flujo normal del documento.
   *                     El navegador YA NO puede desplazarlo con scroll.
   * top: 0           →  anclado siempre al borde superior físico de la pantalla.
   * height se ajusta dinámicamente con JS usando visualViewport.height.
   * ───────────────────────────────────────────────────────────────────────────
   */
  #chat-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100dvh;          /* valor inicial; JS lo sobreescribe en resize */
    display: flex;
    flex-direction: column;
    background: var(--bg-chat);
    overflow: hidden;        /* el scroll vive solo en #chat-messages */
  }

  /* ── HEADER ──────────────────────────────────────────────────────────────── */
  #chat-header {
    flex-shrink: 0;
    height: var(--header-h);
    min-height: var(--header-h);
    background: var(--brand);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px 0 16px;
    color: #fff;
    /* safe area para notch/cámara */
    padding-top: env(safe-area-inset-top, 0px);
    z-index: 10;
  }

  .header-info { display: flex; align-items: center; gap: 10px; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-text h3 { font-size: 15px; font-weight: 600; line-height: 1.2; }
  .header-text .status { font-size: 12px; opacity: .85; display: flex; align-items: center; gap: 4px; }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #7CFC00;
    box-shadow: 0 0 0 2px rgba(124,252,0,.3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(124,252,0,.3); }
    50%      { box-shadow: 0 0 0 5px rgba(124,252,0,.0); }
  }

  #close-btn {
    background: none; border: none;
    color: rgba(255,255,255,.85);
    font-size: 18px; cursor: pointer;
    padding: 8px; border-radius: 50%;
    line-height: 1;
    transition: background .15s;
  }
  #close-btn:hover { background: rgba(255,255,255,.15); }

  /* Franja decorativa del wallpaper */
  .wallpaper-stripe {
    flex-shrink: 0;
    height: 120px;
    background: var(--brand);
    position: relative;
    overflow: hidden;
  }
  .wallpaper-stripe::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -10%;
    width: 120%; height: 80px;
    background: var(--bg-chat);
    border-radius: 50%;
  }

  /* ── MENSAJES ────────────────────────────────────────────────────────────── */
  #chat-messages {
    flex: 1 1 0;             /* flex: 1 1 0 → crece Y se encoge libremente */
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    padding: 8px 10px 4px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 82%;
    padding: 7px 10px 5px;
    border-radius: 8px;
    font-size: 14.5px;
    line-height: 1.45;
    color: var(--text-main);
    box-shadow: var(--shadow);
    position: relative;
    word-break: break-word;
    animation: popIn .18s ease-out;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.92) translateY(4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg.bot  { background: var(--bubble-bot); align-self: flex-start; border-top-left-radius: 2px; }
  .msg.user { background: var(--bubble-user); align-self: flex-end;  border-top-right-radius: 2px; }

  .msg .time {
    font-size: 10.5px;
    color: var(--text-muted);
    float: right;
    margin-left: 8px;
    margin-top: 3px;
    line-height: 1;
  }

  /* ── TYPING INDICATOR ────────────────────────────────────────────────────── */
  #typing-indicator {
    display: none;
    gap: 4px;
    padding: 10px 12px;
    width: fit-content;
  }
  #typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #aaa;
    animation: bounce 1.2s infinite ease-in-out;
    display: block;
  }
  #typing-indicator span:nth-child(2) { animation-delay: .2s; }
  #typing-indicator span:nth-child(3) { animation-delay: .4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-5px); }
  }

  /* ── FORM ────────────────────────────────────────────────────────────────── */
  #chat-form {
    flex-shrink: 0;
    min-height: var(--form-h);
    background: #F0F2F5;
    border-top: 1px solid #D9DBDF;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    /* safe-area para barra de gestos de iOS */
    padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
  }

  #chat-input {
    flex: 1;
    border: none;
    border-radius: 24px;
    background: #fff;
    padding: 10px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text-main);
    outline: none;
    resize: none;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    transition: box-shadow .2s;
  }
  #chat-input:focus { box-shadow: 0 0 0 2px rgba(0,196,140,.35); }
  #chat-input::placeholder { color: #aaa; }

  #send-btn {
    flex-shrink: 0;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--brand);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    box-shadow: 0 2px 6px rgba(0,196,140,.4);
    transition: background .15s, transform .1s;
  }
  #send-btn:hover  { background: var(--brand-dark); }
  #send-btn:active { transform: scale(.92); }
  #send-btn svg    { width: 20px; height: 20px; }

  /* Fecha separadora */
  .date-sep {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-muted);
    background: rgba(255,255,255,.7);
    border-radius: 8px;
    padding: 3px 10px;
    align-self: center;
    margin: 6px 0;
  }
</style>
</head>
<body>

<div id="chat-container">

  <header id="chat-header">
    <div class="header-info">
      <div class="avatar">🏃</div>
      <div class="header-text">
        <h3>Soporte Marateca</h3>
        <span class="status"><span class="status-dot"></span>En línea</span>
      </div>
    </div>
    <button id="close-btn" aria-label="Cerrar">✕</button>
  </header>

  <div id="chat-messages">
    <div class="date-sep">Hoy</div>
    <div class="msg bot">
      ¡Hola! 👋 Bienvenido al soporte de Marateca. ¿En qué puedo ayudarte hoy?
      <span class="time" id="welcome-time"></span>
    </div>
  </div>

  <div id="typing-indicator" class="msg bot" role="status" aria-label="Escribiendo">
    <span></span><span></span><span></span>
  </div>

  <form id="chat-form" autocomplete="off">
    <input
      type="text"
      id="chat-input"
      placeholder="Escribe un mensaje..."
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      enterkeyhint="send"
    >
    <button type="submit" id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </form>

</div>

<script>
/* ============================================================
   ANCLAJE DE VIEWPORT — SOLUCIÓN CORE
   ============================================================
   Problema: el navegador móvil desplaza el documento hacia arriba
   para centrar el input enfocado, lo que "arrastra" el header
   fuera de la pantalla.

   Solución:
   1. position: fixed  →  saca #chat-container del flujo del doc.
                          El browser no puede hacer scroll del doc
                          porque no hay nada que scrollear.
   2. top: 0 (fijo en CSS)  →  siempre anclado al borde superior.
   3. visualViewport 'resize'  →  cuando aparece/desaparece el teclado,
      solo modificamos HEIGHT del contenedor. Nunca tocamos `top`.
   ============================================================ */

const chatContainer  = document.getElementById('chat-container');
const chatMessages   = document.getElementById('chat-messages');
const chatForm       = document.getElementById('chat-form');
const chatInput      = document.getElementById('chat-input');
const typingIndicator = document.getElementById('typing-indicator');

/* Hora de bienvenida */
document.getElementById('welcome-time').textContent = now();

/* ── 1. CONTROL DE ALTURA POR VISUAL VIEWPORT ───────────────────────────── */
function applyViewport() {
  if (!window.visualViewport) return;

  const vvH = window.visualViewport.height;

  /*
   * Forzamos la altura al espacio visible real.
   * "top" NO se toca: siempre es 0 (definido en CSS).
   * El teclado reduce visualViewport.height → el contenedor se encoge
   * desde abajo, dejando el header intacto arriba.
   */
  chatContainer.style.height = vvH + 'px';

  /* Scroll al último mensaje cuando aparece el teclado */
  requestAnimationFrame(() => {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  });
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', applyViewport, { passive: true });
  window.visualViewport.addEventListener('scroll', applyViewport, { passive: true });
  applyViewport(); /* valor inicial */
}

/* Fallback sin visualViewport (navegadores antiguos) */
window.addEventListener('resize', () => {
  if (window.visualViewport) return;
  chatContainer.style.height = window.innerHeight + 'px';
}, { passive: true });

/* ── 2. BLOQUEAR SCROLL DEL DOCUMENTO ───────────────────────────────────── */
/* Evita que el bounce/rubber-band de iOS mueva la pantalla */
document.addEventListener('touchmove', e => {
  if (!chatMessages.contains(e.target)) e.preventDefault();
}, { passive: false });

/* ── 3. LÓGICA DEL CHAT ──────────────────────────────────────────────────── */
const N8N_WEBHOOK_URL = 'https://TU_DOMINIO.app.n8n.cloud/webhook/TU_ID';
// ↑ Reemplaza con tu URL real de n8n

function now() {
  return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${escapeHtml(text)}<span class="time">${now()}</span>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showTyping(show) {
  typingIndicator.style.display = show ? 'flex' : 'none';
  if (show) chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function sendToN8n(message) {
  showTyping(true);
  try {
    const res = await fetch(N8N_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, timestamp: Date.now() })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    showTyping(false);
    /* Adapta según la estructura de tu respuesta n8n */
    const reply = data?.output ?? data?.message ?? data?.text ?? '(Sin respuesta)';
    addMessage(reply, 'bot');
  } catch (err) {
    showTyping(false);
    addMessage('⚠️ No pude conectar con el servidor. Intenta de nuevo.', 'bot');
    console.error('[n8n]', err);
  }
}

chatForm.addEventListener('submit', e => {
  e.preventDefault();
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  addMessage(text, 'user');
  sendToN8n(text);
});

/* Enter en móvil sin Shift envía */
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    chatForm.dispatchEvent(new Event('submit'));
  }
});

document.getElementById('close-btn').addEventListener('click', () => {
  /* Integra aquí tu lógica de cierre / postMessage al parent */
  console.log('Chat cerrado');
});
</script>
</body>
</html>
